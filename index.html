<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abitur Checklisten 2026 – Offline</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: #171717;
      color: #fff;
      padding: 28px 20px 20px;
      border-bottom: 4px solid var(--subject-color, #c0392b);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #b9b9b9;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #d4d4d4;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .tab {
      border: 2px solid rgba(255,255,255,0.18);
      background: transparent;
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      transition: 0.16s ease;
    }

    .tab.active {
      background: var(--tab-color, #c0392b);
      border-color: var(--tab-color, #c0392b);
      font-weight: 700;
    }

    .content {
      padding: 26px 18px 56px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      border-top: 4px solid var(--subject-color, #c0392b);
    }

    .hero h2 {
      margin: 0;
      font-size: 24px;
      color: var(--subject-color, #c0392b);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      border: 1px solid var(--subject-color, #c0392b);
      color: var(--subject-color, #c0392b);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .progressRing {
      width: 84px;
      height: 84px;
      position: relative;
      flex: 0 0 auto;
    }

    .progressRing svg {
      width: 84px;
      height: 84px;
      display: block;
    }

    .progressText {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--subject-color, #c0392b);
      font-size: 14px;
    }

    .quarter {
      margin-top: 26px;
    }

    .quarterHead {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .quarterBadge {
      background: var(--subject-color, #c0392b);
      color: #fff;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 700;
      min-width: 58px;
      text-align: center;
    }

    .quarterBar {
      flex: 1;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .quarterBarFill {
      height: 100%;
      width: 0%;
      background: var(--subject-accent, #e74c3c);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .quarterMeta {
      width: 70px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-bottom: 10px;
      overflow: hidden;
    }

    .sectionHeader {
      width: 100%;
      border: none;
      background: #fafafa;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }

    .sectionHeader.done {
      background: var(--subject-bg, #fff5f5);
    }

    .arrow {
      width: 18px;
      color: #666;
    }

    .sectionTitle {
      flex: 1;
      font-weight: 700;
      font-size: 15px;
      line-height: 1.35;
    }

    .pill {
      font-size: 12px;
      border-radius: 999px;
      padding: 4px 8px;
      background: #ececec;
      color: #666;
      font-weight: 700;
    }

    .sectionHeader.done .pill {
      background: var(--subject-color, #c0392b);
      color: #fff;
    }

    .topics {
      border-top: 1px solid #eee;
      padding: 8px 0 12px;
    }

    .topic {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 9px 16px;
      border-left: 3px solid transparent;
    }

    .topic.checked {
      background: var(--subject-bg, #fff5f5);
      border-left-color: var(--subject-accent, #e74c3c);
    }

    .topic input {
      margin-top: 2px;
      transform: scale(1.08);
      accent-color: var(--subject-color, #c0392b);
    }

    .topicText {
      font-size: 14px;
      line-height: 1.45;
      color: #303030;
    }

    .topic.checked .topicText {
      color: #7a7a7a;
      text-decoration: line-through;
    }

    .lkTag {
      display: inline-block;
      margin-right: 8px;
      padding: 2px 6px;
      font-size: 10px;
      line-height: 1;
      border-radius: 4px;
      color: white;
      background: var(--subject-color, #c0392b);
      font-weight: 700;
      vertical-align: middle;
    }

    .sectionTools {
      padding: 0 16px;
      margin-top: 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .miniBtn {
      border: 1px solid var(--subject-color, #c0392b);
      background: white;
      color: var(--subject-color, #c0392b);
      border-radius: 999px;
      font: inherit;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      color: #8a8a8a;
      font-size: 12px;
      margin-top: 34px;
    }

    @media (max-width: 700px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .progressRing {
        margin: 0 auto;
      }
      .quarterHead {
        flex-wrap: wrap;
      }
      .quarterMeta {
        width: auto;
      }
    }
  </style>
</head>

                  'Nachfrageorientierte Politik: Fiskalpolitik und Geldpolitik',
                  'Probleme: Inflation und Staatsverschuldung'
                ]
              },
              {
                id: 'powi_q2_2',
                title: 'Q2.2 – Nachhaltiges Wachstum und fairer Wettbewerb',
                topics: [
                  'Bedeutung und Faktoren wirtschaftlichen Wachstums',
                  'Neoklassische Konzeption und Angebotsbedingungen',
                  'Angebotsorientierte Wirtschaftspolitik',
                  'Wettbewerbsfähigkeit im europäischen Binnenmarkt',
                  'Probleme angebotsorientierter Politik'
                ]
              },
              {
                id: 'powi_q2_4',
                title: 'Q2.4 – Arbeitsmarkt und Tarifpolitik',
                topics: [
                  'Beschäftigungsentwicklung und Fachkräftemangel',
                  'Arbeitsmarktpolitische Instrumente',
                  'Tarifvertragsparteien, Tarifpolitik und Tarifautonomie',
                  'Einkommens- und Vermögensverteilung',
                  'Gerechtigkeitsbegriffe'
                ]
              }
            ]
          },
          {
            q: 'Q3',
            sections: [
              {
                id: 'powi_q3_1',
                title: 'Q3.1 – Internationale Konflikte',
                topics: [
                  'Analyse aktueller Konflikte',
                  'Konfliktarten: Bürgerkrieg, zwischenstaatlicher Konflikt, Terrorismus, Cyberangriff',
                  'Folgen: Flucht und Vertreibung',
                  'Ziele deutscher Außen- und Sicherheitspolitik',
                  'UNO und NATO'
                ]
              },
              {
                id: 'powi_q3_2',
                title: 'Q3.2 – Strukturwandel der Weltwirtschaft',
                topics: [
                  'Entgrenzung und Verflechtung von Nationalökonomien',
                  'Außenhandel, Freihandelszonen, Binnenmärkte, Währungsräume, Kapitalmärkte',
                  'Globalisierung von Unternehmen und Produktionsprozessen',
                  'Standortfaktoren und Standortwettbewerb',
                  'Wohlfahrtsstaat vs. Wettbewerbsstaat',
                  'WTO: Liberalisierung vs. Regulierung'
                ]
              },
              {
                id: 'powi_q3_5',
                title: 'Q3.5 – Weltumweltpolitik',
                topics: [
                  'Wechselwirkungen globaler ökologischer und ökonomischer Herausforderungen',
                  'Weltklimawandel',
                  'Ziele, Interessen und Strategien staatlicher und privater Akteure',
                  'Internationale Umweltpolitik: Kooperation vs. Verteilungskonflikte'
                ]
              }
            ]
          }
        ]
      }
    ];

    const state = {
      checked: {},
      openSections: {},
      activeSubject: 'deutsch'
    };

    function loadState() {
      try {
        const savedChecked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        const savedUi = JSON.parse(localStorage.getItem(UI_KEY) || '{}');
        state.checked = savedChecked && typeof savedChecked === 'object' ? savedChecked : {};
        state.openSections = savedUi.openSections && typeof savedUi.openSections === 'object' ? savedUi.openSections : {};
        if (savedUi.activeSubject && subjects.some(s => s.id === savedUi.activeSubject)) {
          state.activeSubject = savedUi.activeSubject;
        }
      } catch (e) {
        state.checked = {};
        state.openSections = {};
        state.activeSubject = 'deutsch';
      }
    }

    function saveChecked() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.checked));
    }

    function saveUi() {
      localStorage.setItem(UI_KEY, JSON.stringify({
        activeSubject: state.activeSubject,
        openSections: state.openSections
      }));
    }

    function getSubject() {
      return subjects.find(s => s.id === state.activeSubject) || subjects[0];
    }

    function countDone(section) {
      return section.topics.filter((_, i) => state.checked[`${section.id}_${i}`]).length;
    }

    function calcSubjectProgress(subject) {
      const total = subject.quarters.flatMap(q => q.sections.flatMap(s => s.topics)).length;
      const done = subject.quarters.flatMap(q => q.sections.flatMap(s => s.topics.filter((_, i) => state.checked[`${s.id}_${i}`]))).length;
      return { total, done, pct: total ? (done / total) * 100 : 0 };
    }

    function setTheme(subject) {
      document.documentElement.style.setProperty('--subject-color', subject.color);
      document.documentElement.style.setProperty('--subject-accent', subject.accent);
      document.documentElement.style.setProperty('--subject-bg', subject.bg);
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = subjects.map(subject => `
        <button class="tab ${subject.id === state.activeSubject ? 'active' : ''}" data-subject="${subject.id}" style="--tab-color:${subject.color}">
          ${subject.name} · ${subject.level}
        </button>
      `).join('');

      tabs.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeSubject = btn.dataset.subject;
          saveUi();
          render();
        });
      });
    }

    function progressRing(pct, color) {
      const r = 30;
      const c = 2 * Math.PI * r;
      const offset = c * (1 - pct / 100);
      return `
        <div class="progressRing">
          <svg viewBox="0 0 84 84" aria-hidden="true">
            <circle cx="42" cy="42" r="30" fill="none" stroke="#e7e7e7" stroke-width="8"></circle>
            <circle cx="42" cy="42" r="30" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 42 42)"></circle>
          </svg>
          <div class="progressText">${Math.round(pct)}%</div>
        </div>
      `;
    }

    function render() {
      const subject = getSubject();
      setTheme(subject);
      renderTabs();

      const app = document.getElementById('app');
      const overall = calcSubjectProgress(subject);

      app.innerHTML = `
        <section class="card hero">
          <div>
            <h2>${subject.name}</h2>
            <div class="muted">${subject.level} · ${overall.done} von ${overall.total} Themen erledigt</div>
            <div class="actions">
              <button class="btn" id="reset-subject">Fach zurücksetzen</button>
              <button class="btn" id="reset-all">Alles zurücksetzen</button>
              <button class="btn" id="expand-all">Alle aufklappen</button>
              <button class="btn" id="collapse-all">Alle zuklappen</button>
            </div>
          </div>
          ${progressRing(overall.pct, subject.color)}
        </section>

        ${subject.quarters.map(quarter => {
          const qTotal = quarter.sections.flatMap(s => s.topics).length;
          const qDone = quarter.sections.flatMap(s => s.topics.filter((_, i) => state.checked[`${s.id}_${i}`])).length;
          const qPct = qTotal ? (qDone / qTotal) * 100 : 0;

          return `
            <section class="quarter">
              <div class="quarterHead">
                <div class="quarterBadge">${quarter.q}</div>
                <div class="quarterBar"><div class="quarterBarFill" style="width:${qPct}%"></div></div>
                <div class="quarterMeta">${qDone}/${qTotal}</div>
              </div>

              ${quarter.sections.map(section => {
                const done = countDone(section);
                const allDone = done === section.topics.length;
                const isOpen = state.openSections[section.id] !== false;
                return `
                  <article class="card section">
                    <button class="sectionHeader ${allDone ? 'done' : ''}" data-toggle-section="${section.id}">
                      <span class="arrow">${isOpen ? '▾' : '▸'}</span>
                      <span class="sectionTitle">${section.title}</span>
                      <span class="pill">${done}/${section.topics.length}</span>
                    </button>
                    ${isOpen ? `
                      <div class="topics">
                        ${section.topics.map((topic, i) => {
                          const key = `${section.id}_${i}`;
                          const isChecked = !!state.checked[key];
                          const isLK = topic.startsWith('[LK]');
                          const text = isLK ? topic.replace('[LK] ', '') : topic;
                          return `
                            <label class="topic ${isChecked ? 'checked' : ''}">
                              <input type="checkbox" data-topic-key="${key}" ${isChecked ? 'checked' : ''}>
                              <span class="topicText">${isLK ? '<span class="lkTag">LK</span>' : ''}${escapeHtml(text)}</span>
                            </label>
                          `;
                        }).join('')}
                        <div class="sectionTools">
                          <button class="miniBtn" data-mark-section="${section.id}">${done === section.topics.length ? 'Alle abwählen' : 'Alle abhaken'}</button>
                        </div>
                      </div>
                    ` : ''}
                  </article>
                `;
              }).join('')}
            </section>
          `;
        }).join('')}
      `;

      bindEvents();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function bindEvents() {
      document.querySelectorAll('[data-topic-key]').forEach(input => {
        input.addEventListener('change', () => {
          const key = input.dataset.topicKey;
          state.checked[key] = input.checked;
          saveChecked();
          render();
        });
      });

      document.querySelectorAll('[data-toggle-section]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.toggleSection;
          state.openSections[id] = !(state.openSections[id] !== false);
          saveUi();
          render();
        });
      });

      document.querySelectorAll('[data-mark-section]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.markSection;
          const subject = getSubject();
          let targetSection = null;
          subject.quarters.forEach(q => q.sections.forEach(s => { if (s.id === id) targetSection = s; }));
          if (!targetSection) return;
          const allChecked = targetSection.topics.every((_, i) => !!state.checked[`${id}_${i}`]);
          targetSection.topics.forEach((_, i) => { state.checked[`${id}_${i}`] = !allChecked; });
          saveChecked();
          render();
        });
      });

      document.getElementById('reset-subject').addEventListener('click', () => {
        const subject = getSubject();
        subject.quarters.forEach(q => q.sections.forEach(s => s.topics.forEach((_, i) => {
          delete state.checked[`${s.id}_${i}`];
        })));
        saveChecked();
        render();
      });

      document.getElementById('reset-all').addEventListener('click', () => {
        state.checked = {};
        saveChecked();
        render();
      });

      document.getElementById('expand-all').addEventListener('click', () => {
        const subject = getSubject();
        subject.quarters.forEach(q => q.sections.forEach(s => { state.openSections[s.id] = true; }));
        saveUi();
        render();
      });

      document.getElementById('collapse-all').addEventListener('click', () => {
        const subject = getSubject();
        subject.quarters.forEach(q => q.sections.forEach(s => { state.openSections[s.id] = false; }));
        saveUi();
        render();
      });
    }

    loadState();
    render();
  </script>
</body>
</html>
